<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hunter's Drive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>body{font-family:system-ui}</style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div id="login" class="min-h-screen flex items-center justify-center">
    <div class="bg-gray-900 p-10 rounded-3xl shadow-2xl w-96 text-center">
      <h1 class="text-4xl font-bold mb-8">Hunter's Drive</h1>
      <input id="passInput" type="password" placeholder="Master password" class="w-full p-4 bg-gray-800 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg mb-4">
      <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-semibold text-lg">Unlock</button>
    </div>
  </div>

  <div id="app" class="hidden flex flex-col h-screen">
    <div class="flex items-center justify-between border-b border-gray-800 p-4 bg-gray-900">
      <h1 class="text-3xl font-bold flex items-center gap-3"><i class="fas fa-lock text-blue-500"></i> Hunter's Drive</h1>
      <div class="flex items-center gap-4">
        <div id="status" class="text-green-400 text-sm flex items-center gap-1"><i class="fas fa-circle text-xs"></i> Online</div>
        <button onclick="logout()" class="px-4 py-2 bg-red-700 hover:bg-red-800 rounded-xl">Lock</button>
      </div>
    </div>

    <div id="breadcrumbs" class="p-4 bg-gray-900 text-sm flex flex-wrap gap-2 border-b border-gray-800"></div>

    <div class="p-4 flex gap-4 border-b border-gray-800 bg-gray-900">
      <button onclick="document.getElementById('fileInput').click()" class="flex items-center gap-2 bg-green-600 hover:bg-green-700 px-6 py-3 rounded-xl"><i class="fas fa-upload"></i> Upload Files</button>
      <button onclick="createFolder()" class="flex items-center gap-2 bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-xl"><i class="fas fa-folder-plus"></i> New Folder</button>
    </div>

    <div class="flex flex-1 overflow-hidden">
      <div class="flex-1 p-6 overflow-auto">
        <input id="fileInput" type="file" multiple class="hidden" onchange="handleUpload(event)">

        <div id="dropZone" class="border-4 border-dashed border-gray-700 rounded-3xl h-64 flex items-center justify-center text-gray-400 hover:border-blue-500 hover:text-white transition mb-8 text-2xl font-bold cursor-pointer">
          Drop files here or click to upload
        </div>

        <div id="fileList" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
      </div>

      <div id="previewModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-gray-900 rounded-3xl w-full max-w-4xl max-h-[90vh] flex flex-col">
          <div class="flex justify-between p-6 border-b border-gray-700">
            <h3 id="previewName" class="text-xl font-bold truncate"></h3>
            <button onclick="document.getElementById('previewModal').classList.add('hidden')" class="text-4xl">&times;</button>
          </div>
          <div id="previewContent" class="p-6 flex-1 overflow-auto"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://rhiannon-splashiest-virilely.ngrok-free.dev'; // UPDATE TO YOUR CURRENT NGROK
    let masterPass = localStorage.getItem('masterPass') || '';

    async function deriveKey(salt) {
      const enc = new TextEncoder();
      const material = await crypto.subtle.importKey('raw', enc.encode(masterPass), 'PBKDF2', false, ['deriveBits', 'deriveKey']);
      return crypto.subtle.deriveKey({name: 'PBKDF2', salt: new Uint8Array(salt), iterations: 100000, hash: 'SHA-256'}, material, {name: 'AES-GCM', length: 256}, false, ['encrypt', 'decrypt']);
    }

    async function encryptFile(file) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(salt);
      const buf = await file.arrayBuffer();
      const encrypted = await crypto.subtle.encrypt({name: 'AES-GCM', iv}, key, buf);
      const combined = new Uint8Array(salt.byteLength + iv.byteLength + encrypted.byteLength);
      combined.set(salt, 0);
      combined.set(iv, salt.byteLength);
      combined.set(new Uint8Array(encrypted), salt.byteLength + iv.byteLength);
      return new Blob([combined]);
    }

    async function decryptBlob(blob) {
      const buf = await blob.arrayBuffer();
      const salt = buf.slice(0, 16);
      const iv = buf.slice(16, 28);
      const cipher = buf.slice(28);
      const key = await deriveKey(salt);
      const decrypted = await crypto.subtle.decrypt({name: 'AES-GCM', iv: new Uint8Array(iv)}, key, cipher);
      return new Blob([decrypted]);
    }

    async function login() {
      const pass = document.getElementById('passInput').value.trim();
      if (!pass) return alert('Enter the password');
      const res = await fetch(`${API}/auth`, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({password: pass})});
      if (res.ok) {
        masterPass = pass;
        localStorage.setItem('masterPass', pass);
        document.getElementById('login').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        loadFiles();
      } else {
        alert('Wrong password - double-check backend MASTER_PASS');
      }
    }

    async function loadFiles() {
      try {
        const res = await fetch(`${API}/files?path=${encodeURIComponent(currentPath)}`);
        if (!res.ok) throw new Error('List fetch failed: ' + res.status);
        const data = await res.json();
        console.log('Files loaded:', data);
        renderFiles(data);
        renderBreadcrumbs();
      } catch (e) {
        console.error('Load error:', e);
        alert('Cannot load files - check ngrok/backend running? See console (F12)');
      }
    }

    function renderFiles(items) {
      const container = document.getElementById('fileList');
      container.innerHTML = '';
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'bg-gray-900 p-4 rounded-xl hover:bg-gray-800 cursor-pointer';
        div.innerHTML = `
          <div class="text-6xl mb-2 text-center">${item.is_folder ? '📁' : '📄'}</div>
          <div class="font-medium text-center truncate">${item.name}</div>
          ${item.is_folder ? '' : `<div class="text-xs text-gray-400 text-center">${(item.size / 1024 / 1024).toFixed(2)} MB • ${new Date(item.uploaded).toLocaleDateString()}</div>`}
        `;
        if (item.is_folder) {
          div.onclick = () => {
            currentPath = currentPath === '/' ? `/${item.name}/` : currentPath + item.name + '/';
            loadFiles();
          };
        } else {
          div.onclick = () => previewFile(item);
        }
        container.appendChild(div);
      });
    }

    async function handleUpload(e) {
      e.preventDefault();
      const files = e.target?.files || e.dataTransfer?.files || [];
      if (files.length === 0) return;

      for (let file of files) {
        console.log('Uploading:', file.name);
        try {
          const encrypted = await encryptFile(file);
          const form = new FormData();
          form.append('file', encrypted, file.name + '.enc');
          form.append('path', currentPath);

          const res = await fetch(`${API}/upload`, {method: 'POST', body: form});
          if (res.ok) {
            console.log('Success:', file.name);
            alert('Uploaded ' + file.name + ' - refreshing...');
          } else {
            console.error('Upload fail:', await res.text());
            alert('Upload failed for ' + file.name);
          }
        } catch (err) {
          console.error('Encrypt/upload error:', err);
          alert('Error with ' + file.name);
        }
      }
      loadFiles(); // force refresh
    }

    async function previewFile(item) {
      try {
        const res = await fetch(`${API}/download/${item.id}?name=${encodeURIComponent(item.name)}`);
        const blob = await res.blob();
        const decrypted = await decryptBlob(blob);
        const url = URL.createObjectURL(decrypted);

        document.getElementById('previewName').textContent = item.name;
        const content = document.getElementById('previewContent');
        content.innerHTML = `<img src="${url}" class="max-h-[80vh] mx-auto rounded-xl" alt="preview">`; // fallback to image for test; expand later
        document.getElementById('previewModal').classList.remove('hidden');
      } catch (err) {
        console.error('Preview error:', err);
        alert('Cannot preview - wrong pass or file issue');
      }
    }

    function renderBreadcrumbs() {
      const bc = document.getElementById('breadcrumbs');
      bc.innerHTML = '<span class="cursor-pointer hover:text-blue-400" onclick="goToPath(\'/')">Home</span>';
      const parts = currentPath.split('/').filter(p => p);
      let accum = '/';
      parts.forEach(p => {
        accum += p + '/';
        bc.innerHTML += ` <span class="text-gray-500">/</span> <span class="cursor-pointer hover:text-blue-400" onclick="goToPath('${accum}')">${p}</span>`;
      });
    }

    function goToPath(path) {
      currentPath = path;
      loadFiles();
    }

    async function createFolder() {
      const name = prompt('Folder name:');
      if (!name) return;
      const res = await fetch(`${API}/create_folder`, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name, path: currentPath})});
      if (res.ok) loadFiles();
      else alert('Folder create failed');
    }

    function logout() {
      localStorage.removeItem('masterPass');
      location.reload();
    }

    // Auto-login & events
    if (masterPass) {
      document.getElementById('login').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      loadFiles();
    }

    document.getElementById('dropZone').addEventListener('dragover', e => e.preventDefault());
    document.getElementById('dropZone').addEventListener('drop', handleUpload);
    document.getElementById('dropZone').addEventListener('click', () => document.getElementById('fileInput').click());

    setInterval(() => {
      fetch(API).then(() => document.getElementById('status').innerHTML = '<i class="fas fa-circle text-green-400 text-xs"></i> Online')
               .catch(() => document.getElementById('status').innerHTML = '<i class="fas fa-circle text-red-400 text-xs"></i> Offline');
    }, 10000);
  </script>
</body>
</html>
