<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hunter's Drive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>body{font-family:system-ui}</style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div id="login" class="min-h-screen flex items-center justify-center">
    <div class="bg-gray-900 p-10 rounded-3xl shadow-2xl w-96">
      <h1 class="text-4xl font-bold text-center mb-8">Hunter's Drive</h1>
      <input id="passInput" type="password" placeholder="Master password" class="w-full p-4 bg-gray-800 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg">
      <button onclick="login()" class="mt-6 w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-semibold text-lg">Unlock Drive</button>
    </div>
  </div>

  <div id="app" class="hidden flex flex-col h-screen">
    <!-- header -->
    <div class="flex items-center justify-between p-6 border-b border-gray-800 bg-gray-900">
      <h1 class="text-3xl font-bold flex items-center gap-3"><i class="fas fa-lock"></i> Hunter's Drive</h1>
      <div class="flex items-center gap-4">
        <div id="status" class="flex items-center gap-1 text-green-400"><i class="fas fa-circle"></i> Online</div>
        <button onclick="logout()" class="px-6 py-2 bg-red-700 hover:bg-red-800 rounded-2xl">Lock</button>
      </div>
    </div>

    <!-- breadcrumbs -->
    <div id="breadcrumbs" class="px-6 py-3 bg-gray-900 text-sm flex gap-2 overflow-x-auto border-b border-gray-800"></div>

    <!-- toolbar -->
    <div class="px-6 py-4 flex gap-4 border-b border-gray-800 bg-gray-900">
      <button onclick="document.getElementById('fileInput').click()" class="flex items-center gap-2 bg-green-600 hover:bg-green-700 px-6 py-3 rounded-2xl"><i class="fas fa-upload"></i> Upload</button>
      <button onclick="createFolder()" class="flex items-center gap-2 bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-2xl"><i class="fas fa-folder-plus"></i> New Folder</button>
      <input id="search" placeholder="Search files..." oninput="searchFiles()" class="flex-1 bg-gray-800 border border-gray-700 rounded-2xl px-5 py-3 focus:outline-none">
      <select id="sortSelect" onchange="sortFiles()" class="bg-gray-800 rounded-2xl px-4 py-3">
        <option value="name">Name</option>
        <option value="size">Size</option>
        <option value="date">Date</option>
      </select>
    </div>

    <div class="flex flex-1 overflow-hidden">
      <!-- recent -->
      <div class="w-72 bg-gray-900 border-r border-gray-800 p-4 overflow-auto hidden lg:block">
        <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fas fa-clock"></i> Recent</h3>
        <div id="recentList" class="space-y-3"></div>
      </div>

      <!-- main -->
      <div class="flex-1 p-6 overflow-auto" id="mainArea">
        <input id="fileInput" type="file" multiple class="hidden" onchange="handleUpload(event)">
        
        <div id="dropZone" class="border-4 border-dashed border-gray-700 rounded-3xl h-80 flex flex-col items-center justify-center text-2xl font-bold text-gray-400 hover:border-blue-500 hover:text-blue-400 transition-all cursor-pointer mb-8">
          Drop files here or click Upload
        </div>

        <div id="fileGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
      </div>
    </div>

    <!-- preview modal -->
    <div id="previewModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
      <div class="bg-gray-900 rounded-3xl max-w-5xl w-full max-h-[90vh] flex flex-col overflow-hidden">
        <div class="p-6 border-b border-gray-700 flex justify-between items-center">
          <h3 id="previewName" class="text-xl font-bold"></h3>
          <button onclick="closePreview()" class="text-4xl hover:text-white">×</button>
        </div>
        <div id="previewContent" class="flex-1 p-6 overflow-auto bg-gray-950"></div>
      </div>
    </div>

    <!-- context menu -->
    <div id="contextMenu" class="hidden fixed bg-gray-900 border border-gray-700 rounded-xl shadow-2xl py-2 z-50">
      <button onclick="doDelete()" class="block w-full text-left px-6 py-3 hover:bg-gray-800">Delete</button>
      <button onclick="doRename()" class="block w-full text-left px-6 py-3 hover:bg-gray-800">Rename</button>
      <button onclick="doShare()" class="block w-full text-left px-6 py-3 hover:bg-gray-800">Copy Share Link</button>
    </div>
  </div>

  <script>
    let masterPass = localStorage.getItem('masterPass') || '';
    let currentPath = '/';
    let files = [];
    let currentItem = null;
    const API = 'https://rhiannon-splashiest-virilely.ngrok-free.dev'; // CHANGE TO YOUR CURRENT NGROK URL

    async function deriveKey(salt) {
      const enc = new TextEncoder();
      const material = await crypto.subtle.importKey('raw', enc.encode(masterPass), 'PBKDF2', false, ['deriveBits', 'deriveKey']);
      return crypto.subtle.deriveKey({name:'PBKDF2', salt: new Uint8Array(salt), iterations:100000, hash:'SHA-256'}, material, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
    }

    async function encryptFile(file) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(salt);
      const buf = await file.arrayBuffer();
      const encrypted = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, buf);
      const combined = new Uint8Array(salt.byteLength + iv.byteLength + encrypted.byteLength);
      combined.set(salt, 0);
      combined.set(iv, salt.byteLength);
      combined.set(new Uint8Array(encrypted), salt.byteLength + iv.byteLength);
      return new Blob([combined]);
    }

    async function decryptBlob(blob) {
      const buf = await blob.arrayBuffer();
      const salt = buf.slice(0,16);
      const iv = buf.slice(16,28);
      const cipher = buf.slice(28);
      const key = await deriveKey(salt);
      const decrypted = await crypto.subtle.decrypt({name:'AES-GCM', iv: new Uint8Array(iv)}, key, cipher);
      return new Blob([decrypted]);
    }

    async function login() {
      const pass = document.getElementById('passInput').value.trim();
      if (!pass) return alert('Enter password');
      const res = await fetch(`${API}/auth`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pass})});
      if (res.ok) {
        masterPass = pass;
        localStorage.setItem('masterPass', pass);
        document.getElementById('login').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        loadFiles();
      } else alert('Wrong password – check backend MASTER_PASS');
    }

    async function loadFiles() {
      try {
        const res = await fetch(`${API}/files?path=${encodeURIComponent(currentPath)}`);
        files = await res.json();
        renderFiles();
        renderRecent();
        renderBreadcrumbs();
      } catch(e) { console.error(e); alert('Load failed – check ngrok is running'); }
    }

    function renderFiles() {
      const container = document.getElementById('fileGrid');
      container.innerHTML = '';
      files.forEach(item => {
        const card = document.createElement('div');
        card.className = 'bg-gray-900 rounded-2xl p-4 cursor-pointer hover:bg-gray-800';
        card.innerHTML = `
          <div class="text-6xl mb-3 text-center">${item.is_folder ? '📁' : '📄'}</div>
          <div class="font-medium truncate text-center">${item.name}</div>
          ${!item.is_folder ? `<div class="text-xs text-gray-400 text-center">${(item.size/1024/1024).toFixed(1)} MB</div>` : ''}
        `;
        card.oncontextmenu = (e) => { e.preventDefault(); showContextMenu(e, item); };
        card.onclick = () => {
          if (item.is_folder) {
            currentPath = currentPath === '/' ? `/${item.name}/` : currentPath + item.name + '/';
            loadFiles();
          } else previewFile(item);
        };
        container.appendChild(card);
      });
    }

    function renderRecent() {
      const container = document.getElementById('recentList');
      container.innerHTML = '';
      const recent = files.filter(f => !f.is_folder).sort((a,b) => new Date(b.uploaded) - new Date(a.uploaded)).slice(0,6);
      recent.forEach(item => {
        const div = document.createElement('div');
        div.className = 'bg-gray-800 p-3 rounded-xl cursor-pointer hover:bg-gray-700';
        div.innerHTML = `<div class="font-medium truncate">${item.name}</div>`;
        div.onclick = () => previewFile(item);
        container.appendChild(div);
      });
    }

    function renderBreadcrumbs() {
      const bc = document.getElementById('breadcrumbs');
      bc.innerHTML = `<span class="cursor-pointer hover:text-blue-400" onclick="goHome()">Home</span>`;
      const parts = currentPath.split('/').filter(Boolean);
      let pathSoFar = '/';
      parts.forEach(p => {
        pathSoFar += p + '/';
        bc.innerHTML += ` <span class="text-gray-500">/</span> <span class="cursor-pointer hover:text-blue-400" onclick="goToPath('${pathSoFar}')">${p}</span>`;
      });
    }

    function goHome() { currentPath = '/'; loadFiles(); }
    function goToPath(p) { currentPath = p; loadFiles(); }

    async function handleUpload(e) {
      const uploadFiles = e.target.files || e.dataTransfer.files;
      if (!uploadFiles.length) return;
      for (let file of uploadFiles) {
        const progressDiv = document.createElement('div');
        progressDiv.className = 'mt-4 text-center text-sm';
        progressDiv.innerHTML = `Encrypting & uploading ${file.name}...`;
        document.getElementById('mainArea').appendChild(progressDiv);

        const encrypted = await encryptFile(file);
        const form = new FormData();
        form.append('file', encrypted, file.name + '.enc');
        form.append('path', currentPath);

        const res = await fetch(`${API}/upload`, {method:'POST', body:form});
        if (res.ok) {
          progressDiv.innerHTML = `✅ ${file.name} uploaded`;
          setTimeout(() => progressDiv.remove(), 2000);
        } else {
          progressDiv.innerHTML = `❌ Failed ${file.name}`;
        }
      }
      loadFiles();
    }

    async function previewFile(item) {
      const res = await fetch(`${API}/download/${item.id}?name=${encodeURIComponent(item.name)}`);
      const blob = await res.blob();
      const decrypted = await decryptBlob(blob);
      const url = URL.createObjectURL(decrypted);

      document.getElementById('previewName').textContent = item.name;
      const content = document.getElementById('previewContent');
      content.innerHTML = '';

      if (item.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) content.innerHTML = `<img src="${url}" class="max-w-full mx-auto rounded-2xl">`;
      else if (item.name.match(/\.(mp4|webm)$/i)) content.innerHTML = `<video src="${url}" controls autoplay class="max-w-full mx-auto rounded-2xl"></video>`;
      else if (item.name.match(/\.pdf$/i)) content.innerHTML = `<iframe src="${url}" class="w-full h-full"></iframe>`;
      else content.innerHTML = `<pre class="bg-gray-800 p-6 rounded-2xl overflow-auto">${await decrypted.text()}</pre>`;

      document.getElementById('previewModal').classList.remove('hidden');
    }

    function closePreview() {
      document.getElementById('previewModal').classList.add('hidden');
    }

    function showContextMenu(e, item) {
      currentItem = item;
      const menu = document.getElementById('contextMenu');
      menu.style.left = e.pageX + 'px';
      menu.style.top = e.pageY + 'px';
      menu.classList.remove('hidden');
    }

    function doDelete() {
      if (!currentItem || currentItem.is_folder) return;
      if (confirm('Delete ' + currentItem.name + '?')) {
        fetch(`${API}/delete/${currentItem.id}`, {method:'DELETE'}).then(() => loadFiles());
      }
      document.getElementById('contextMenu').classList.add('hidden');
    }

    function doRename() {
      if (!currentItem) return;
      const newName = prompt('New name:', currentItem.name);
      if (newName && newName !== currentItem.name) {
        fetch(`${API}/rename/${currentItem.id}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:newName})}).then(() => loadFiles());
      }
      document.getElementById('contextMenu').classList.add('hidden');
    }

    function doShare() {
      if (!currentItem) return;
      fetch(`${API}/share/${currentItem.id}`).then(r => r.json()).then(data => {
        navigator.clipboard.writeText(data.share_link);
        alert('Share link copied! Anyone with it can download directly.');
      });
      document.getElementById('contextMenu').classList.add('hidden');
    }

    function searchFiles() {
      const term = document.getElementById('search').value.toLowerCase();
      const filtered = files.filter(f => f.name.toLowerCase().includes(term));
      const container = document.getElementById('fileGrid');
      container.innerHTML = '';
      filtered.forEach(item => {
        // same card code as renderFiles – copy-paste or extract later
        const card = document.createElement('div');
        card.className = 'bg-gray-900 rounded-2xl p-4 cursor-pointer hover:bg-gray-800';
        card.innerHTML = `<div class="text-6xl mb-3 text-center">${item.is_folder ? '📁' : '📄'}</div><div class="font-medium truncate text-center">${item.name}</div>`;
        card.onclick = () => item.is_folder ? (currentPath = currentPath === '/' ? `/${item.name}/` : currentPath + item.name + '/', loadFiles()) : previewFile(item);
        container.appendChild(card);
      });
    }

    function sortFiles() {
      const sort = document.getElementById('sortSelect').value;
      if (sort === 'name') files.sort((a,b) => a.name.localeCompare(b.name));
      if (sort === 'size') files.sort((a,b) => (b.size||0) - (a.size||0));
      if (sort === 'date') files.sort((a,b) => new Date(b.uploaded) - new Date(a.uploaded));
      renderFiles();
    }

    function createFolder() {
      const name = prompt('Folder name:');
      if (!name) return;
      fetch(`${API}/create_folder`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, path:currentPath})})
        .then(() => loadFiles());
    }

    function logout() {
      localStorage.removeItem('masterPass');
      location.reload();
    }

    // Setup
    if (masterPass) {
      document.getElementById('login').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      loadFiles();
    }

    document.getElementById('dropZone').addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('dropZone').addEventListener('dragover', e => e.preventDefault());
    document.getElementById('dropZone').addEventListener('drop', handleUpload);

    // Close context menu when clicking elsewhere
    document.addEventListener('click', () => document.getElementById('contextMenu').classList.add('hidden'));

    // Status
    setInterval(() => {
      fetch(API).then(() => document.getElementById('status').innerHTML = '<i class="fas fa-circle"></i> Online')
                .catch(() => document.getElementById('status').innerHTML = '<i class="fas fa-circle text-red-400"></i> Offline');
    }, 10000);
  </script>
</body>
</html>
